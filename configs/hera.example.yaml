# CLI Settings
cli:
  skin: default
  profile: default

# Cron / Scheduled Tasks
cron:
  enabled: false

# Security
security:
  redact_pii: false
  dangerous_approve: true
  protected_paths:
    - ~/.ssh
    - ~/.gnupg
    - ~/.aws/credentials

# MCP Servers (Model Context Protocol)
mcp_servers:
  playwright:
    command: npx
    args: ["@executeautomation/playwright-mcp-server"]
    enabled: true
