version: "3.8"

services:
  hera:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: hera-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # HERA_HOME is set inside the image to /data; override here if needed.
      - HERA_HOME=/data
    volumes:
      # /data is the writable user-data volume: config.yaml, hera.db,
      # synced skills, logs. Survives container restarts and image upgrades.
      # Bundled skills inside the image are at /app/bundled (HERA_BUNDLED).
      - hera-data:/data
    ports:
      - "8080:8080"
    # Health check uses wget against the apiserver platform's /health endpoint.
    # This only works when gateway.platforms.apiserver.enabled=true in config.
    # If you don't use apiserver, comment out the healthcheck or use a
    # simple process check instead.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  hera-data:
