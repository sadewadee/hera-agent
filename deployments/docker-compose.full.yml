# Full-image deployment — Hera with Python MCP enabled.
#
# Use this compose file instead of docker-compose.yml when you want
# python_exec / python_register_tool / python_pip_install available to
# the agent. The Dockerfile.full image bundles Python 3.12 and the
# hera-python-mcp server; Hera spawns it as a stdio subprocess on
# startup because mcp_servers.python.enabled = true in the mounted
# config.yaml.
#
# Start:    docker compose -f deployments/docker-compose.full.yml up -d
version: "3.8"

services:
  hera:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.full
    container_name: hera-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - HERA_HOME=/data
    volumes:
      # /data is the writable user-data volume: config.yaml, memory db,
      # Python venv, synced skills, logs. Persists across restarts and
      # image upgrades. Bundled skills are at /app/bundled (read-only).
      - hera-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  hera-data:
