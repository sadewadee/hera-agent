name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v), e.g. 0.0.142'
        required: true
        type: string
      ref:
        description: 'Commit SHA or branch to build (defaults to main)'
        required: false
        type: string
        default: main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hera-agent:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/hera-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
