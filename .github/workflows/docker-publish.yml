name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version (strip leading v)
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hera-agent:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/hera-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
